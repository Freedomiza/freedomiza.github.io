<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the compile
    script.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Khoa Le - Senior Mobile Developer Portfolio. Flutter, iOS, Android expert.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KHOA LE">

  <!-- Open Graph -->
  <meta property="og:title" content="KHOA LE | SENIOR MOBILE DEVELOPER">
  <meta property="og:description" content="Senior Mobile Developer specializing in Flutter, iOS & Android. 12+ years of experience.">
  <meta property="og:type" content="website">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>KHOA LE | SENIOR MOBILE DEVELOPER</title>

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: #131313;
      overflow: hidden;
    }
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #131313;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: monospace;
      color: #ffb4aa;
    }
    #loading-overlay .logo {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 6px;
      margin-bottom: 32px;
    }
    #loading-overlay .bar-container {
      width: 200px;
      height: 12px;
      background: #2a2a2a;
      position: relative;
      overflow: hidden;
    }
    #loading-overlay .bar-fill {
      height: 100%;
      background: #e4000f;
      animation: loadBar 1.5s ease-in-out forwards;
    }
    #loading-overlay .label {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 3px;
      color: #8c7b78;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes loadBar {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading-overlay">
    <div class="logo">LEVEL_01</div>
    <div class="bar-container">
      <div class="bar-fill"></div>
    </div>
    <div class="label">LOADING ASSETS...</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.style.transition = 'opacity 0.3s ease';
        overlay.style.opacity = '0';
        setTimeout(() => overlay.remove(), 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
