name: portfolio
description: Khoa Le - Senior Mobile Developer Portfolio
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_svg: ^2.2.4
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: any
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_gen: ^5.13.0+1
  flutter_gen_runner:

flutter:
  uses-material-design: true
  assets:
    - assets/data/projects.json
    - assets/data/skills.json
    - assets/data/experience.json
    - assets/json/contact-me.json
    - assets/images/

flutter_gen:
  # output: lib/gen/ # Optional (default: lib/gen/)
  line_length: 80 # Optional

  # Optional
  integrations:
    image: true
    flutter_svg: true
    rive: true
    lottie: true

  # colors:
  #   inputs:
  #     - assets/color/colors.xml
